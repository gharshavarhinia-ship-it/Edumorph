<style>
  /* Google Fonts Import - Roboto */
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    background: #12002b;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Roboto', sans-serif; /* Changed to Roboto */
    -webkit-font-smoothing: antialiased; /* For smooth text rendering */
    letter-spacing: 0.2px;
    background: linear-gradient(135deg, #1a0d36 0%, #250f55 25%, #12002b 55%, #0f0b28 100%);
    background: -webkit-linear-gradient(135deg, #1a0d36 0%, #250f55 25%, #12002b 55%, #0f0b28 100%);
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
    color: #fff;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  .stats-merged-card {
    max-width: 100%;
  }

  .stats-merged-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 24px;
    align-items: stretch;
  }

  .stats-panel {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 22px;
  }

  .stats-panel-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    color: #f8f8ff;
    font-size: 18px;
    font-weight: 600;
  }

  .stats-panel-subtext {
    color: #9ca3af;
    font-size: 14px;
    margin-top: 10px;
  }

  .stats-big-value {
    font-size: 30px;
    line-height: 1;
    font-weight: 700;
    color: #8b7bff;
    margin: 14px 0 8px;
  }

  .stats-secondary-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .stats-pill {
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(99, 102, 241, 0.16);
    border: 1px solid rgba(99, 102, 241, 0.28);
    color: #c7d2fe;
    font-size: 13px;
    font-weight: 600;
  }

  .credits-card {
    size:border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 10px;
  }

  .credits-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
  }

  .credits-top h3 {
    margin-bottom: 10px;
  }

  .credits-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    background: rgba(99, 102, 241, 0.18);
    border: 1px solid rgba(99, 102, 241, 0.32);
    color: #8b7bff;
    font-size: 24px;
    flex-shrink: 0;
  }

  .credits-value {
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    color: #ffffff;
    margin: 8px 0;
  }

  .credits-meta {
    color: #9ca3af;
    font-size: 14px;
    line-height: 1.6;
  }

  .upgrade-pro-btn {
    width: 100%;
    padding: 14px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6d4aff, #7c3aed);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .upgrade-pro-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 28px rgba(124, 58, 237, 0.35);
  }

  @media (max-width: 768px) {
    .stats-merged-grid {
      grid-template-columns: 1fr;
    }
  }


  /* Headings & Titles Weight Adjustment */
  h1, h2, h3, h4, h5, h6, .auth-card h2 {
    font-family: 'Roboto', sans-serif;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* Custom Scrollbar for Sidebar and Lists */
  
  .sidebar, #profilePageLibraryList {
    scrollbar-width: thin;
    scrollbar-color: #6366f1 rgba(255, 255, 255, 0.05);
  }

  .sidebar::-webkit-scrollbar, #profilePageLibraryList::-webkit-scrollbar {
    width: 5px;
  }

  .sidebar::-webkit-scrollbar-track, #profilePageLibraryList::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
  }

  .sidebar::-webkit-scrollbar-thumb, #profilePageLibraryList::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 10px;
  }

  .sidebar::-webkit-scrollbar-thumb:hover, #profilePageLibraryList::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(135deg, #a855f7, #6366f1);
  }

  .auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .auth-card {
    position: relative;
    z-index: 10;
    background: rgba(255, 255, 255, 0.06);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 25px;
    padding: 60px 50px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
  }

  .auth-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 40px;
    font-size: 32px;
    color: #6366f1;
  }

  .auth-logo div {
    width: 55px;
    height: 55px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .auth-card h2 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 10px;
    color: #fff;
  }

  .auth-card .subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 35px;
    font-size: 14px;
    font-weight: 400;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  .input-wrapper {
    position: relative;
  }

  .input-wrapper input {
    width: 100%;
    padding: 14px 15px 14px 45px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    transition: all 0.3s ease;
    font-family: 'Roboto', sans-serif;
  }

  .input-wrapper input::placeholder {
    color: #999;
  }

  .input-wrapper input:focus {
    outline: none;
    border-color: #6366f1;
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
  }

  .input-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
  }

  .btn {
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Roboto', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: #fff;
    width: 100%;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
  }

  .auth-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
    font-size: 13px;
  }

  .checkbox {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .forgot-link {
    color: #6366f1;
    text-decoration: none;
    cursor: pointer;
  }

  .auth-switch {
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
    color: #aaa;
  }

  .auth-switch a {
    color: #6366f1;
    text-decoration: none;
    font-weight: 700;
    cursor: pointer;
  }

  .hidden {
    display: none !important;
  }

  .dashboard {
    display: none;
  }

  .dashboard.active {
    display: block;
  }

  .sidebar {
    
   position: fixed;
    left: 0;
    top: 0;
    width: 260px;
    height: 100vh;
    background: rgba(20, 10, 40, 0.95); /* Solid for better visibility */
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(99, 102, 241, 0.2);
    padding: 20px;
    z-index: 2000;
    transform: translateX(-100%);
    transition: transform 0.4s ease;
    display: flex;
    flex-direction: column;
  }

   .sidebar-logo{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
gap:8px;
margin-bottom:40px;
}

  .sidebar-logo div {
    width: 48px;

    flex-shrink: 0;

    border-radius: 12px;

    align-items: center;

     background: linear-gradient(135deg, #6366f1, #a855f7);

  .sidebar-logo img {

  }

  /* User Profile Section in Sidebar */
  .sidebar-user-section {
    background: rgba(255, 255, 255, 0.06);

  .sidebar-detail-value {

  }

  .sidebar-menu {
  margin-top: 10px; /* Extra gap from logo */
    list-style: none;
    padding: 0;

  .sidebar-menu li {
    margin-bottom: 12px;
  }

  .sidebar-menu a {
   display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    color: #bbb;
    text-decoration: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    transition: 0.3s ease;
  }
  .sidebar-menu a i {
    width: 25px;
    text-align: center;
    font-size: 18px;
    color: #6366f1; 
}

  .sidebar-menu a:hover {
    background: rgba(99, 102, 241, 0.15);
    color: #6366f1;
  }

  .sidebar-menu a.active {
    background: rgba(99, 102, 241, 0.25);
    color: #6366f1;
    border-left: 3px solid #6366f1;
  }

  .main-content {
   margin-left: 0;
    width: 100%;
    padding: 30px;
    padding-top: 0px;
    transition: all 0.4s ease;
    min-height: 100vh;;
  }

  .menu-toggle {
    display: flex !important;
    align-items: center;
    justify-content: center;
    position: fixed;
    top: 15px;
    left: 15px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border: none;
    color: #fff;
    width: 38px;
    height: 38px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 2100;
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    transition: all 0.3s ease;
  }

  .menu-toggle:hover {
    transform: scale(1.1);
  }

  .sidebar.active {
    transform: translateX(0);
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: nowrap;
    width: 100%;
    margin-bottom: 0px;
    padding-top: 10px 10px;
    background: rgba(255, 255, 255, 0.06);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 15px;
    padding:5px 25px;
  }

  /* Right Side: Streak and Profile */
.user-actions {
    display: flex;
    align-items: center;
    gap: 20px; /* Streak-kum Profile-kum naduvula gap */
}
.streak-badge {
    background: rgba(255, 255, 255, 0.1);
    padding: 8px 15px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}
  .welcome-section{
  text-align: center;
}
  .welcome-section h1 {
    font-family: 'Courier New', monospace;
    font-size: clamp(28px, 6vw, 42px);
    margin: 0px 0px 12px 0px;
    font-weight: 400;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .welcome-section p {
    color: #aaa;
    font-size: 14px;
    font-family: 'Roboto', sans-serif;
  }

  .user-stats {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .stat-badge {
    background: linear-gradient(135deg,
        #1a1a2e 0%,
        #16213e 50%,
        #0f3460 100%);
    padding: 12px 25px;
    border-radius: 20px;
    font-weight: 700;
    border: 1px solid rgba(255, 255, 255, 0.2);
    white-space: nowrap;
  }

  .user-avatar {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    border: 2px solid rgba(99, 102, 241, 0.3);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    z-index: 6000;
    overflow: visible;
  }

  .user-avatar:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
  }

  .user-profile-dropdown {
    position: absolute;
    top: 70px;
    right: 0;
    background: rgba(255, 255, 255, 0.06);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 15px;
    width: 320px;
    padding: 20px;
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
    display: none;
    position: absolute;
    z-index: 9999;
    animation: slideDown 0.3s ease;
    pointer-events: none;
  }

  .user-profile-dropdown.active {
    display: block;
    pointer-events: auto;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .profile-header {
    display: flex;
    align-items: center;
    gap: 15px;
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(99, 102, 241, 0.2);
    margin-bottom: 15px;
  }

  .profile-avatar-large {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    border: 2px solid rgba(99, 102, 241, 0.3);
  }

  .profile-info h3 {
    font-size: 16px;
    color: #fff;
    margin-bottom: 3px;
  }

  .profile-info p {
    font-size: 13px;
    color: #999;
  }

  .profile-details {
    display: grid;
    gap: 12px;
    margin-bottom: 15px;
  }

  .detail-item {
    padding: 10px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    font-size: 13px;
  }

  .detail-item label {
    color: #999;
    display: block;
    margin-bottom: 3px;
  }

  .detail-item span {
    color: #6366f1;
    font-weight: 600;
  }

  .profile-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding-top: 15px;
    border-top: 1px solid rgba(99, 102, 241, 0.2);
  }

  .profile-actions button {
    padding: 8px;
    background: rgba(99, 102, 241, 0.2);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 8px;
    color: #6366f1;
    font-family: 'Roboto', sans-serif;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.3s ease;
  }

  .profile-actions button:hover {
    background: rgba(99, 102, 241, 0.4);
    border-color: #6366f1;
  }

  .files-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    -webkit-backdrop-filter: blur(5px);
    backdrop-filter: blur(5px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }

  .files-modal.active {
    display: flex;
  }

  .files-modal-content {
    background: rgba(255, 255, 255, 0.06);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 20px;
    padding: 40px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.7);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .files-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid rgba(99, 102, 241, 0.3);
  }

  .files-modal-header h2 {
    margin: 0;
    font-size: 28px;
    color: #fff;
  }

  .files-modal-close {
    background: none;
    border: none;
    color: #6366f1;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .files-modal-close:hover {
    transform: scale(1.2);
    color: #ff6b6b;
  }

  .files-modal-list {
    display: grid;
    gap: 15px;
  }

  .files-modal-item {
    padding: 20px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s ease;
  }

  .files-modal-item:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(99, 102, 241, 0.6);
  }

  .file-details {
    flex: 1;
  }

  .file-name {
    color: #fff;
    font-weight: 700;
    margin-bottom: 8px;
    font-size: 16px;
  }

  .file-meta {
    color: #999;
    font-size: 13px;
    line-height: 1.6;
  }

  .content-section {
    display: none;
  }

  .content-section.active {
    display: block;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    margin-bottom: 30px;
  }

  .card {
    background: rgba(255, 255, 255, 0.06);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 15px;
    padding: 30px;
    transition: all 0.3s ease;
    position: relative;

  .sfooter-contact-body { flex: 1; min-width: 180px; }
  .sfooter-contact-body .sfooter-card-title { margin-bottom: 10px; }

  .sfooter-contact-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 32px;
  }

  .sfooter-contact-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.65);
  }

  .sfooter-contact-item i { width: 14px; color: #a78bfa; font-size: 0.78rem; }

  .sfooter-contact-item a {
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    transition: color 0.2s;
  }
  .sfooter-contact-item a:hover { color: #a78bfa; }

  .sfooter-bottom {
    text-align: center;
    padding: 24px 0 28px;
    margin-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 0.76rem;
    color: rgba(255,255,255,0.25);
  }

  .sfooter-bottom span { color: rgba(167,139,250,0.6); }

.quiz-submit-btn {
  background: linear-gradient(135deg, #6366f1, #a855f7);
  border: none;
  padding: 14px 35px;
  font-size: 16px;
  font-weight: 700;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  transition: all 0.3s ease;
}

.quiz-submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 40px rgba(99,102,241,0.4);
}
</style>
</head>

<body>
  

  <!-- Dashboard Section -->
  <div id="dashboardSection" class="dashboard active">
    <!-- Mobile Menu Toggle Button -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
      ☰
    </button>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div>
          <img src="https://logowik.com/content/uploads/images/education-student-owl-design1717061329.logowik.com.webp"
            alt="Edumorph Logo" />
        </div>
        <span style="font-style: italic; font-size: 25px">Edumorph</span>
      </div>
      
      <ul class="sidebar-menu">
      <li>
        <a class="active" href="/home"><i class="fas fa-home"></i> Dashboard</a>
      </li>
        <li>
          <a href="/library"><i class="fas fa-book"></i> My Library</a>
        </li>
        
        <li>
          <a href="/profile"><i class="fas fa-user"></i> User Profile</a>
        </li>
        <li>
          <a href="/"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
        </li>
      </ul>
    </div>

    <div class="main-content">
      <div class="topbar">
        <div class="welcome-section">
          <h1> Welcome, <span id="userName">Student</span>..❤️</h1>
          <p>Keep up your learning momentum</p>
        </div>
        <a href="/profile" style="text-decoration: none;">
            <div class="user-avatar">
              👤
            </div>
          </a>
      </div>

      <div id="componentContainer"></div>
      <div class="age-buttons-grid">
          
          <button class="age-btn" onclick="selectAgeGroup('6-8')">
            <span>Class 6-8</span>
            <span class="age-btn-label"></span>
          </button>
          <button class="age-btn" onclick="selectAgeGroup('9-10')">
            <span>Class 9-10</span>
          </button>
          <button class="age-btn" onclick="selectAgeGroup('11-12')">
            <span>Class 11-12</span>
          </button>
          <button class="age-btn" onclick="selectAgeGroup('higher')">
            <span>Higher Studies</span>
          </button>
        </div>

      <div id="componentContainer"></div>
      
    </div>

  </div>
  <script>
    // ===== GLOBAL VARIABLES =====
    let currentUser = null;
    let selectedLanguage = "en";
    let selectedAge = "11-15";
    let uploadedFiles = [];

    // ===== AGE GROUP SELECTION =====
    function selectAgeGroup(ageGroup) {
      // Map button values to backend values
      const ageMapping = {
        '6-8': '6-8',
        '9-10': '9-10',
        '11-12': '11+',
        'higher': '11+'
      };
      
      const backendValue = ageMapping[ageGroup] || ageGroup;
      
      // Create and submit a form
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = '/select_age';
      
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'age_group';
      input.value = backendValue;
      
      form.appendChild(input);
      document.body.appendChild(form);
      form.submit();
    }

    // ===== SIDEBAR & NAVIGATION =====
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      if (sidebar) {
        sidebar.classList.toggle("active");
      }
    }

    function showSection(sectionName) {
      const sections = document.querySelectorAll(".content-section");
      sections.forEach((s) => s.classList.remove("active"));

      const sectionMap = {
        dashboard: "homesection",
        home: "homeSection",
        library: "librarySection",
        settings: "settingsSection",
        "user-avatar": "userProfileSection",
      };

      if (sectionMap[sectionName]) {
        const section = document.getElementById(sectionMap[sectionName]);
        if (section) {
          section.classList.add("active");
        }
      }

      document
        .querySelectorAll(".sidebar-menu a")
        .forEach((a) => a.classList.remove("active"));

      if (event && event.target) {
        event.target.classList.add("active");
      }

      // Close sidebar on mobile
      if (window.innerWidth <= 768) {
        const sidebar = document.getElementById("sidebar");
        if (sidebar) {
          sidebar.classList.remove("active");
        }
      }
    }

    // ===== FILE UPLOAD & MANAGEMENT =====
    async function handleFileUpload(event) {
      const file = event.target.files[0];
      if (file) {
        const formData = new FormData();
        formData.append("file", file);

        try {
          const response = await fetch("/home/upload", {
            method: "POST",
            body: formData,
          });

          const result = await response.json();

          if (result.success) {
            const fileData = {
              name: file.name,
              size: (file.size / 1024 / 1024).toFixed(2),
              type: file.type,
              date: new Date().toLocaleDateString(),
              time: new Date().toLocaleTimeString(),
            };
            uploadedFiles.push(fileData);

            const fileName = document.getElementById("uploadedFileName");
            if (fileName) fileName.textContent = file.name;

            const generateSection = document.getElementById("generateSection");
            if (generateSection) generateSection.style.display = "block";

            displayUploadedFiles();
          } else {
            alert("Upload failed: " + result.error);
          }
        } catch (error) {
          console.error("Error uploading file:", error);
          alert("An error occurred during upload.");
        }
        event.target.value = "";
      }
    }

    function displayUploadedFiles() {
      const filesList = document.getElementById("uploadedFilesList");
      const section = document.getElementById("uploadedFilesSection");

      if (!filesList || !section) return;

      filesList.innerHTML = "";

      uploadedFiles.forEach((file, index) => {
        const fileCard = document.createElement("div");
        fileCard.style.cssText = `
            padding: 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
          `;

        fileCard.innerHTML = `
            <div style="flex: 1;">
              <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
                <span style="font-size: 28px;">📄</span>
                <div>
                  <h4 style="color: #fff; margin: 0; font-weight: 600;">${file.name}</h4>
                  <p style="color: #999; margin: 5px 0 0 0; font-size: 13px;">
                    ${file.size} MB • ${file.date} ${file.time}
                  </p>
                </div>
              </div>
              <div style="padding-left: 40px; color: #999; font-size: 12px;">
                Type: ${file.type || "File"}
              </div>
            </div>
            <button onclick="removeFile(${index})" style="background: rgba(255, 107, 107, 0.2); border: 1px solid rgba(255, 107, 107, 0.5); color: #ff6b6b; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(255, 107, 107, 0.4)'" onmouseout="this.style.background='rgba(255, 107, 107, 0.2)'">
              🗑️ Remove
            </button>
          `;
        filesList.appendChild(fileCard);
      });

      section.style.display = uploadedFiles.length > 0 ? "block" : "none";
    }

    function removeFile(index) {
      uploadedFiles.splice(index, 1);
      if (uploadedFiles.length === 0) {
        const generateSection = document.getElementById("generateSection");
        const uploadedSection = document.getElementById(
          "uploadedFilesSection",
        );
        if (generateSection) generateSection.style.display = "none";
        if (uploadedSection) uploadedSection.style.display = "none";
      } else {
        displayUploadedFiles();
      }
    }

    function showFilesModal() {
      const modal = document.getElementById("filesModal");
      const listContainer = document.getElementById("filesModalList");
      if (!modal || !listContainer) return;

      listContainer.innerHTML = "";

      if (uploadedFiles.length === 0) {
        listContainer.innerHTML = `<div style="text-align: center; padding: 40px 20px; color: #999;"><div style="font-size: 48px; margin-bottom: 15px;">📭</div><p style="font-size: 16px;">No files uploaded yet</p></div>`;
      } else {
        uploadedFiles.forEach((file, index) => {
          const fileItem = document.createElement("div");
          fileItem.className = "files-modal-item";
          fileItem.innerHTML = `
              <div class="file-details">
                <div class="file-name">📄 ${file.name}</div>
                <div class="file-meta">
                  <div>Size: ${file.size} MB</div>
                  <div>Uploaded: ${file.date} ${file.time}</div>
                  <div style="color: #6366f1; margin-top: 5px;">Type: ${file.type || "File"}</div>
                </div>
              </div>
              <button onclick="removeFileFromModal(${index})" style="background: rgba(255, 107, 107, 0.2); border: 1px solid rgba(255, 107, 107, 0.5); color: #ff6b6b; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; white-space: nowrap; margin-left: 15px;" onmouseover="this.style.background='rgba(255, 107, 107, 0.4)'" onmouseout="this.style.background='rgba(255, 107, 107, 0.2)'">🗑️ Remove</button>
            `;
          listContainer.appendChild(fileItem);
        });
      }
      modal.classList.add("active");
    }

    function closeFilesModal() {
      const modal = document.getElementById("filesModal");
      if (modal) modal.classList.remove("active");
    }

    function removeFileFromModal(index) {
      removeFile(index);
      showFilesModal();
    }

    function generateContent() {
      if (uploadedFiles.length > 0) {
        const fileName = uploadedFiles[uploadedFiles.length - 1].name;
        alert(`✨ Processing "${fileName}"...\n\nPreparing your learning options!`);
        setTimeout(() => {
          window.location.href = "/slider";
        }, 1500);
      }
    }

    // ===== CHAT FUNCTIONS =====
    function toggleChatbot() {
      const chatbotBox = document.getElementById("chatbotBox");
      const chatbotToggle = document.getElementById("chatbotToggle");
      if (chatbotBox && chatbotToggle) {
        chatbotBox.classList.toggle("active");
        chatbotToggle.style.display = chatbotBox.classList.contains("active")
          ? "none"
          : "flex";
      }
    }

    function sendChatMessage() {
      const input = document.getElementById("chatbotInput");
      if (!input) return;
      const message = input.value.trim();
      if (message) {
        addChatMessage(message, "user");
        input.value = "";
        setTimeout(() => {
          const responses = [
            "That's a great question! 🤔",
            "I can explain this better.",
            "Would you like more help?",
            "Great progress! 🌟",
          ];
          addChatMessage(
            responses[Math.floor(Math.random() * responses.length)],
            "bot",
          );
        }, 800);
      }
    }

    function handleChatMessage(event) {
      if (event.key === "Enter") sendChatMessage();
    }

    function addChatMessage(text, sender) {
      const messagesContainer = document.getElementById("chatbotMessages");
      if (!messagesContainer) return;
      const messageDiv = document.createElement("div");
      messageDiv.className = `message ${sender}`;
      messageDiv.textContent = text;
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // ===== USER PROFILE FUNCTIONS =====
    function updateStreak() {
      const streakEl = document.getElementById("streak");
      if (streakEl) streakEl.textContent = Math.floor(Math.random() * 30) + 1;
    }

    function updateUserProfile() {
      const userNameEl = document.getElementById("userName");
      if (!userNameEl) return;
      const userName = userNameEl.textContent;
      const userEmail = userName.toLowerCase() + "@edumorph.com";

      const profileId =
        "EDU-2026-" +
        String(Math.floor(Math.random() * 1000)).padStart(3, "0");
      const profilePoints = Math.floor(Math.random() * 5000) + 1000 + " XP";
      const profileCourses = Math.floor(Math.random() * 10) + 1;

      // Update sidebar profile
      const sidebarUserName = document.getElementById("sidebarUserName");
      const sidebarProfileId = document.getElementById("sidebarProfileId");
      const sidebarProfileJoined = document.getElementById(
        "sidebarProfileJoined",
      );
      const sidebarProfilePoints = document.getElementById(
        "sidebarProfilePoints",
      );
      const sidebarProfileCourses = document.getElementById(
        "sidebarProfileCourses",
      );

      if (sidebarUserName) sidebarUserName.textContent = userName;
      if (sidebarProfileId) sidebarProfileId.textContent = profileId;
      if (sidebarProfileJoined)
        sidebarProfileJoined.textContent = "January 2026";
      if (sidebarProfilePoints)
        sidebarProfilePoints.textContent = profilePoints;
      if (sidebarProfileCourses)
        sidebarProfileCourses.textContent = profileCourses;

      // Also update profile dropdown if it exists
      const profileName = document.getElementById("profileName");
      const profileEmail = document.getElementById("profileEmail");
      const profileIdDropdown = document.getElementById("profileId");
      const profileJoinedDropdown = document.getElementById("profileJoined");
      const profilePointsDropdown = document.getElementById("profilePoints");
      const profileCoursesDropdown =
        document.getElementById("profileCourses");

      if (profileName) profileName.textContent = userName;
      if (profileEmail) profileEmail.textContent = userEmail;
      if (profileIdDropdown) profileIdDropdown.textContent = profileId;
      if (profileJoinedDropdown)
        profileJoinedDropdown.textContent = "January 2026";
      if (profilePointsDropdown)
        profilePointsDropdown.textContent = profilePoints;
      if (profileCoursesDropdown)
        profileCoursesDropdown.textContent = profileCourses;

      // Populate profile page fields (full page view)
      const pName = document.getElementById("profilePageName");
      const pRole = document.getElementById("profilePageRole");
      const pId = document.getElementById("profilePageId");
      const pJoined = document.getElementById("profilePageJoined");
      const pPoints = document.getElementById("profilePagePoints");
      const pCourses = document.getElementById("profilePageCourses");
      const pLang = document.getElementById("profilePagePreferredLanguage");
      const pLib = document.getElementById("profilePageLibraryList");

      if (pName) pName.textContent = userName;
      if (pRole) pRole.textContent = "Learner";
      if (pId) pId.textContent = profileId;
      if (pJoined) pJoined.textContent = "January 2026";
      if (pPoints) pPoints.textContent = profilePoints;
      if (pCourses) pCourses.textContent = profileCourses;
      if (pLang)
        pLang.textContent =
          { en: "English", es: "Spanish", ta: "Tamil", hi: "Hindi" }[
          selectedLanguage
          ] ||
          selectedLanguage ||
          "English";

      if (pLib) {
        pLib.innerHTML = "";
        if (!uploadedFiles || uploadedFiles.length === 0) {
          const none = document.createElement("div");
          none.style.color = "#777";
          none.textContent = "No recent items";
          pLib.appendChild(none);
        } else {
          const recent = uploadedFiles.slice(-10).reverse();
          recent.forEach((f) => {
            const row = document.createElement("div");
            row.style.display = "flex";
            row.style.justifyContent = "space-between";
            row.style.alignItems = "center";
            row.style.gap = "8px";
            row.style.padding = "8px";
            row.style.borderRadius = "8px";
            row.style.background = "rgba(20,50,100,0.35)";
            const name = document.createElement("div");
            name.style.color = "#fff";
            name.style.fontSize = "14px";
            name.style.fontWeight = "600";
            name.textContent = f.name;
            const meta = document.createElement("div");
            meta.style.color = "#999";
            meta.style.fontSize = "12px";
            meta.textContent = `${f.size} MB`;
            row.appendChild(name);
            row.appendChild(meta);
            pLib.appendChild(row);
          });
        }
      }

      // Populate quick settings
      const profilePreferredLanguage = document.getElementById(
        "profilePreferredLanguage",
      );
      if (profilePreferredLanguage) {
        // map common codes to readable names if needed
        const langMap = {
          en: "English",
          es: "Kannadam",
          ta: "Tamil",
          hi: "Hindi",
        };
        profilePreferredLanguage.textContent =
          langMap[selectedLanguage] || selectedLanguage || "English";
      }

      // Populate recent library items inside profile (uses uploadedFiles global)
      const libList = document.getElementById("profileLibraryList");
      if (libList) {
        libList.innerHTML = "";
        if (!uploadedFiles || uploadedFiles.length === 0) {
          const none = document.createElement("div");
          none.style.color = "#777";
          none.textContent = "No recent items";
          libList.appendChild(none);
        } else {
          // show up to 5 recent items
          const recent = uploadedFiles.slice(-5).reverse();
          recent.forEach((f) => {
            const row = document.createElement("div");
            row.style.display = "flex";
            row.style.justifyContent = "space-between";
            row.style.alignItems = "center";
            row.style.gap = "8px";
            const name = document.createElement("div");
            name.style.color = "#fff";
            name.style.fontSize = "13px";
            name.style.fontWeight = "600";
            name.textContent = f.name;
            const meta = document.createElement("div");
            meta.style.color = "#999";
            meta.style.fontSize = "12px";
            meta.textContent = `${f.size} MB`;
            row.appendChild(name);
            row.appendChild(meta);
            libList.appendChild(row);
          });
        }
      }
    }

    // Toggle profile dropdown visibility
    function toggleProfileDropdown() {
      const dropdown = document.getElementById("userProfileDropdown");
      if (!dropdown) return;
      dropdown.classList.toggle("active");
    }

    // Set application language, update UI and persist preference
    function setAppLanguage(lang) {
      selectedLanguage = lang;
      const langMap = {
        en: "English",
        ka: "Kannadam",
        ta: "Tamil",
        hi: "Hindi",
      };
      const human = langMap[lang] || lang;

      const spanSmall = document.getElementById("profilePreferredLanguage");
      const spanPage = document.getElementById(
        "profilePagePreferredLanguage",
      );
      if (spanSmall) spanSmall.textContent = human;
      if (spanPage) spanPage.textContent = human;

      const selSmall = document.getElementById(
        "profilePreferredLanguageSelect",
      );
      const selPage = document.getElementById(
        "profilePagePreferredLanguageSelect",
      );
      const selSettings = document.getElementById("settingsLanguageSelect");
      if (selSmall) selSmall.value = lang;
      if (selPage) selPage.value = lang;
      if (selSettings) selSettings.value = lang;

      try {
        localStorage.setItem("edumorph_lang", lang);
      } catch (e) {
        // ignore
      }
    }

    function logout() {
      window.location.href = "/owl";
    }

    // ===== EVENT LISTENERS =====
    document.addEventListener("click", function (event) {
      // Close files modal when clicking outside
      const filesModal = document.getElementById("filesModal");
      const filesContent = document.querySelector(".files-modal-content");
      if (
        filesModal &&
        filesContent &&
        filesModal.classList.contains("active") &&
        !filesContent.contains(event.target)
      ) {
        closeFilesModal();
      }

      // Close profile dropdown when clicking outside avatar/dropdown
      const profileDropdown = document.getElementById("userProfileDropdown");
      const avatarBtn = document.getElementById("userAvatarBtn");
      if (profileDropdown && profileDropdown.classList.contains("active")) {
        const insideDropdown = profileDropdown.contains(event.target);
        const clickedAvatar = avatarBtn && avatarBtn.contains(event.target);
        if (!insideDropdown && !clickedAvatar) {
          profileDropdown.classList.remove("active");
        }
      }
    });

    // ===== INITIALIZATION =====
    window.addEventListener("load", () => {
      updateStreak();
      const dashboardSection = document.getElementById("dashboardSection");
      if (dashboardSection) dashboardSection.classList.add("active");
      const userNameEl = document.getElementById("userName");
      if (userNameEl) userNameEl.textContent = "Student";
      // load preferred language from localStorage if available
      try {
        const stored = localStorage.getItem("edumorph_lang");
        if (stored) selectedLanguage = stored;
      } catch (e) {
        // ignore
      }

      updateUserProfile();
      // ensure selects and displays are synced
      setAppLanguage(selectedLanguage || "en");

      // Check for animation file in URL parameters
      const urlParams = new URLSearchParams(window.location.search);
const file = urlParams.get('file');

console.log("Video file:", file);

if (file) {
  const video = document.getElementById('animationVideo');
  const source = document.getElementById('animationSource');

  // 🔥 IMPORTANT: full correct path
  source.src = "/static/" + file;

  video.load(); // ⭐ REQUIRED
  video.style.display = "block";

  document.getElementById('animationDisplay').style.display = 'block';
}
    });

    function goHome() {
      window.location.href = "/home";
    }
  </script>
</body>

</html>

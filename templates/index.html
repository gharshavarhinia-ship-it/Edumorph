<html>
<body>

<h2>Upload PDF / Image</h2>

<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file">
    <button type="submit">Generate</button>
</form>

<br>

<a href="/animate"><button>Animate</button></a>
<a href="/comic"><button>Comic</button></a>
<a href="/flowchart"><button>Flowchart</button></a>

<br><br>

<!-- Display video if available -->
{% if video %}
<video width="600" controls autoplay>
    <source src="{{ video }}" type="video/mp4">
    Your browser does not support the video tag.
</video>
{% endif %}

<!-- Display comic image if available -->
{% if comic %}
<img src="{{ comic }}" width="600">
{% endif %}

<!-- Display flowchart if available -->
{% if flowchart %}
<img src="{{ flowchart }}" width="600">
{% endif %}

</body>
</html>
